<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI Assistant Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ANIMATED FLUID BACKGROUND */
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GLASSMORPHISM CONTAINER */
        .chat-container {
            width: 450px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 0 20px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .chat-container:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 25px rgba(255, 255, 255, 0.08);
        }

        /* Glowing orb effect behind the glass */
        .chat-container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #ff007f;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
        }

        .header {
            padding: 25px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            animation: slideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            position: relative; /* Add this so it can pop over other elements */
            z-index: 1;
        }

        message:hover {
            transform: translateY(-3px) scale(1.02);
            z-index: 10;
        }

        /* Specific shadow for user messages on hover */
        .user-msg:hover {
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.5);
        }

        /* Specific shadow for bot messages on hover */
        .bot-msg:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15); /* Slightly brighten the glass */
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* User Message: Vibrant Neon Gradient */
        .user-msg {
            background: linear-gradient(135deg, #ff007f, #7928ca);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        /* Bot Message: Frosted Glass */
        .bot-msg {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            gap: 15px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            outline: none;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        input:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 0, 127, 0.5);
            transform: translateY(-1px);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff007f;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4), inset 0 0 10px rgba(255, 0, 127, 0.1);
            transform: translateY(-2px);
        }

        button {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        button:hover {
            transform: scale(1.1) rotate(-3deg); /* Slight tilt to look dynamic */
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.7);
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: white;
            transform: translateX(2px) translateY(0px); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover svg {
            transform: translateX(5px) translateY(-4px) scale(1.1); 
        }

        /* Typing Indicator dots */
        .typing-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(255,255,255,0); text-shadow: .25em 0 0 rgba(255,255,255,0), .5em 0 0 rgba(255,255,255,0);}
            40% { color: white; text-shadow: .25em 0 0 rgba(255,255,255,0), .5em 0 0 rgba(255,255,255,0);}
            60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(255,255,255,0);}
            80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white;}
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">HCI Research Assistant</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Hello! I am your HCI Research Assistant. How can I help you with your studies today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about HCI concepts..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" title="Send Message">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        // Add user message
        appendMessage(message, "user-msg");
        inputField.value = "";

        // Add typing indicator
        const typingId = appendMessage("<span class='typing-dots'>Analyzing input</span>", "bot-msg", true);

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            document.getElementById(typingId).remove();
            
            const formattedReply = data.reply.replace(/\n/g, "<br>");
            appendMessage(formattedReply, "bot-msg", true);

        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage("⚠️ Connection error. Check backend server.", "bot-msg");
        }
    }

    function appendMessage(text, className, isHTML = false) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + className;
        msgDiv.id = "msg-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
        
        if (isHTML) {
            msgDiv.innerHTML = text;
        } else {
            msgDiv.innerText = text;
        }

        chatBox.appendChild(msgDiv);
        
        // Smooth scroll to bottom
        chatBox.scrollTo({
            top: chatBox.scrollHeight,
            behavior: 'smooth'
        });
        
        return msgDiv.id;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
